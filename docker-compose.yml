services:
  postgres:
    image: postgres:16
    container_name: order-mgt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_mgt
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: